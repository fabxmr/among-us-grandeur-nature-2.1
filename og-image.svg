<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a2340"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stars -->
  <g fill="white">
    <circle cx="100" cy="80" r="1.5" opacity="0.8"/>
    <circle cx="350" cy="120" r="2" opacity="0.6"/>
    <circle cx="600" cy="60" r="1" opacity="0.9"/>
    <circle cx="900" cy="100" r="1.5" opacity="0.7"/>
    <circle cx="1100" cy="80" r="2" opacity="0.8"/>
    <circle cx="200" cy="500" r="1" opacity="0.6"/>
    <circle cx="500" cy="540" r="2" opacity="0.7"/>
    <circle cx="800" cy="500" r="1.5" opacity="0.9"/>
    <circle cx="1050" cy="540" r="1" opacity="0.6"/>
    <circle cx="60" cy="300" r="1" opacity="0.5"/>
    <circle cx="1130" cy="320" r="1.5" opacity="0.7"/>
    <circle cx="700" cy="180" r="1" opacity="0.6"/>
    <circle cx="450" cy="240" r="1" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="monospace" font-size="92" font-weight="900" fill="#ff2244" filter="url(#glow)">AMONG US</text>
  <!-- Subtitle -->
  <text x="600" y="335" text-anchor="middle" font-family="monospace" font-size="32" fill="#7BC9E8" letter-spacing="4">— GRANDEUR NATURE —</text>
  <!-- Tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#aabbff">Cartes 16 joueurs · Règles · Quests · Défis</text>
  <!-- Impostor right -->
  <g transform="translate(1000 480) scale(5) translate(-32 -32)">
    <rect x="11" y="22" width="9" height="22" rx="3" fill="#8B1A1A" stroke="#5C0F0F" stroke-width="1.5"/>
    <path d="M22 22 Q22 12 32 12 Q44 12 44 22 V42 Q47 42 47 48 V58 H39 V52 H26 V58 H18 V48 Q18 42 22 42 Z" fill="#E74C3C" stroke="#8B1A1A" stroke-width="2"/>
    <path d="M27 18 Q24 18 24 22 V27 Q24 30 27 30 H42 Q45 30 45 27 V22 Q45 18 42 18 Z" fill="#7BC9E8" stroke="#1F4E5F" stroke-width="1.5"/>
    <ellipse cx="40" cy="22" rx="2.5" ry="1.5" fill="#fff" opacity="0.7"/>
  </g>
  <!-- Crewmate left -->
  <g transform="translate(200 480) scale(5) translate(-32 -32)">
    <rect x="11" y="22" width="9" height="22" rx="3" fill="#1a4a2a" stroke="#0d2515" stroke-width="1.5"/>
    <path d="M22 22 Q22 12 32 12 Q44 12 44 22 V42 Q47 42 47 48 V58 H39 V52 H26 V58 H18 V48 Q18 42 22 42 Z" fill="#27AE60" stroke="#1a4a2a" stroke-width="2"/>
    <path d="M27 18 Q24 18 24 22 V27 Q24 30 27 30 H42 Q45 30 45 27 V22 Q45 18 42 18 Z" fill="#7BC9E8" stroke="#1F4E5F" stroke-width="1.5"/>
    <ellipse cx="40" cy="22" rx="2.5" ry="1.5" fill="#fff" opacity="0.7"/>
  </g>
</svg>
